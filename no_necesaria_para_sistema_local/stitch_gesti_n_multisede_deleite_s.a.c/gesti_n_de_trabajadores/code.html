<script>
        // Simple micro-interaction for list items
        document.querySelectorAll('.worker-card-shadow').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.classList.add('scale-[0.98]');
            });
            card.addEventListener('mouseup', () => {
                card.classList.remove('scale-[0.98]');
            });
            card.addEventListener('mouseleave', () => {
                card.classList.remove('scale-[0.98]');
            });
        });

        // FAB active state handled via CSS/Tailwind active:scale-90
