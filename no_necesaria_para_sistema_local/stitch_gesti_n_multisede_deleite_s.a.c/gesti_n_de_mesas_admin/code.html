<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Gestión de Mesas - Bakery Manager</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..900&amp;family=Manrope:wght@100..900&amp;family=Work+Sans:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .status-dot-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d5c3bd;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#e3d8d1",
                        "tertiary-fixed-dim": "#cbc6b9",
                        "on-tertiary-container": "#a19c90",
                        "inverse-primary": "#ecbcaa",
                        "primary-fixed": "#ffdbce",
                        "surface-container-low": "#fdf1eb",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#ece0da",
                        "secondary-container": "#fed65b",
                        "on-secondary-fixed": "#241a00",
                        "surface": "#fff8f5",
                        "surface-container-high": "#f2e6df",
                        "primary-container": "#4b2c20",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#bf9282",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#1d1c13",
                        "on-secondary-fixed-variant": "#574500",
                        "surface-container": "#f7ece5",
                        "error": "#ba1a1a",
                        "background": "#fff8f5",
                        "tertiary-fixed": "#e8e2d4",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#83746f",
                        "on-tertiary-fixed-variant": "#49473d",
                        "inverse-on-surface": "#faeee8",
                        "tertiary-container": "#36342b",
                        "secondary-fixed-dim": "#e9c349",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#ffe088",
                        "secondary": "#735c00",
                        "on-primary-fixed": "#2e140a",
                        "error-container": "#ffdad6",
                        "surface-variant": "#ece0da",
                        "on-secondary-container": "#745c00",
                        "on-surface-variant": "#504440",
                        "on-primary-fixed-variant": "#613e31",
                        "surface-bright": "#fff8f5",
                        "on-surface": "#201b17",
                        "primary-fixed-dim": "#ecbcaa",
                        "outline-variant": "#d5c3bd",
                        "on-error": "#ffffff",
                        "on-background": "#201b17",
                        "inverse-surface": "#352f2b",
                        "primary": "#32170d",
                        "tertiary": "#211f16",
                        "surface-tint": "#7b5647"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "sm": "8px",
                        "margin-mobile": "16px",
                        "xl": "32px",
                        "gutter": "16px",
                        "margin-desktop": "32px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Manrope"],
                        "body-lg": ["Work Sans"],
                        "label-sm": ["JetBrains Mono"],
                        "label-lg": ["Work Sans"],
                        "headline-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "body-md": ["Work Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-lg": ["14px", {"letterSpacing": "0.5px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-secondary-container selection:text-on-secondary-container min-h-screen pb-32">
<!-- Top AppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface-container shadow-sm flex items-center justify-between px-margin-mobile py-sm w-full z-40">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="store">store</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Gestión de Mesas</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant">
<img alt="Manager Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a bakery manager with a friendly expression. The person is wearing a clean, modern chef uniform. The background is a blurred high-end artisanal bakery interior with warm wood textures and soft, atmospheric lighting that emphasizes a high-quality, professional culinary environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDu_yutEXZYmvWkBH__uJfCiLApnzYutfm9fVZ3ZP6plb_WAG2Z5VTo77xgMNOliUcIiquTh7g1_U0c8knrShv6coBMmpBRUdhhSQ7rtMHyhM1SS1wVJfRW5J0zyYAjYaU5VZn2oD5QkgnVs8m6vzQ2y1CdV1d00V3ZMJGrSAAtaYB8aHbpCbb7WKmFXyvF34_4aDSYCeg44nlSw7PjK1SpViqLdEmmIeqWY0FRdWoQnWvCHwqpA3new53COq9TG2ygGinm6wqUhKo0">
</div>
</header>
<main class="max-w-7xl mx-auto px-margin-mobile pt-lg space-y-lg">
<!-- Summary Stats Section -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
<div class="bg-surface-container p-lg rounded-xl shadow-sm border border-outline-variant/30 flex flex-col justify-between h-32 group hover:border-primary/20 transition-all">
<span class="font-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="groups">groups</span> Total Capacity
                </span>
<div class="flex items-baseline gap-xs">
<span class="font-headline-lg text-headline-lg text-primary">48</span>
<span class="font-body-md text-on-surface-variant">Pax</span>
</div>
</div>
<div class="bg-surface-container p-lg rounded-xl shadow-sm border border-outline-variant/30 flex flex-col justify-between h-32 group hover:border-primary/20 transition-all">
<span class="font-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="table_bar">table_bar</span> Active Tables
                </span>
<div class="flex items-baseline gap-xs">
<span class="font-headline-lg text-headline-lg text-primary">12</span>
<span class="font-body-md text-on-surface-variant">/ 16 total</span>
</div>
</div>
<div class="bg-surface-container p-lg rounded-xl shadow-sm border border-outline-variant/30 flex flex-col justify-center h-32 space-y-sm">
<div class="flex justify-between items-center">
<span class="font-label-lg text-on-surface-variant">Current Occupancy</span>
<span class="font-label-sm text-primary">75%</span>
</div>
<div class="w-full bg-surface-container-highest rounded-full h-3 overflow-hidden">
<div class="bg-primary h-full rounded-full transition-all duration-1000" style="width: 75%"></div>
</div>
</div>
</section>
<!-- Filters & Actions -->
<section class="flex flex-col md:flex-row gap-md justify-between items-start md:items-center">
<div class="flex flex-wrap gap-sm">
<button class="bg-surface-container-high border border-outline-variant px-md py-xs rounded-full font-label-lg text-primary hover:bg-primary hover:text-on-primary transition-colors flex items-center gap-xs active:scale-95 duration-150">
<span class="material-symbols-outlined text-sm" data-icon="filter_list">filter_list</span> All Mesas
                </button>
<button class="bg-surface-container-lowest border border-outline-variant px-md py-xs rounded-full font-label-lg text-on-surface-variant hover:border-primary transition-colors flex items-center gap-xs active:scale-95 duration-150">
                    Available
                </button>
<button class="bg-surface-container-lowest border border-outline-variant px-md py-xs rounded-full font-label-lg text-on-surface-variant hover:border-primary transition-colors flex items-center gap-xs active:scale-95 duration-150">
                    Occupied
                </button>
</div>
<button class="bg-error-container text-on-error-container px-md py-xs rounded-lg font-label-lg flex items-center gap-xs hover:shadow-md transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-sm" data-icon="delete_sweep">delete_sweep</span> Bulk Delete
            </button>
</section>
<!-- Table Grid -->
<section class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-gutter">
<!-- Table Card Template (Repeated 12 times with variations) -->
<script>
                const tableStatuses = [
                    { label: 'Available', color: 'bg-emerald-500', textColor: 'text-emerald-500', bgColor: 'bg-emerald-50', icon: 'check_circle' },
                    { label: 'Occupied', color: 'bg-amber-500', textColor: 'text-amber-500', bgColor: 'bg-amber-50', icon: 'person' },
                    { label: 'Reserved', color: 'bg-primary', textColor: 'text-primary', bgColor: 'bg-primary-fixed', icon: 'event' }
                ];
                
                const gridContainer = document.currentScript.parentElement;
                
                for (let i = 1; i <= 12; i++) {
                    const status = i % 3 === 0 ? tableStatuses[2] : (i % 2 === 0 ? tableStatuses[1] : tableStatuses[0]);
                    const pax = [2, 4, 6, 8][Math.floor(Math.random() * 4)];
                    
                    const card = `
                        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm shadow-sm hover:shadow-lg hover:border-primary/40 transition-all cursor-pointer group active:scale-95 duration-150">
                            <div class="flex justify-between items-start">
                                <span class="font-label-sm text-on-surface-variant opacity-60">#${i.toString().padStart(2, '0')}</span>
                                <div class="w-2 h-2 rounded-full ${status.color} ${status.label === 'Occupied' ? 'status-dot-pulse' : ''}"></div>
                            </div>
                            <div class="py-sm flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary/20 text-4xl group-hover:scale-110 transition-transform" data-icon="table_restaurant">table_restaurant</span>
                            </div>
                            <div class="flex flex-col gap-xs">
                                <div class="flex justify-between items-center">
                                    <span class="font-headline-sm text-headline-sm text-primary">Mesa ${i}</span>
                                    <span class="font-label-sm text-on-surface-variant flex items-center gap-[2px]">
                                        <span class="material-symbols-outlined text-[14px]" data-icon="group">group</span>${pax}
                                    </span>
                                </div>
                                <span class="${status.bgColor} ${status.textColor} text-[10px] uppercase tracking-wider font-bold px-sm py-[2px] rounded-full self-start flex items-center gap-[4px]">
                                    <span class="material-symbols-outlined text-[12px]" data-icon="${status.icon}">${status.icon}</span>
                                    ${status.label}
                                </span>
                            </div>
                        </div>
                    `;
                    gridContainer.innerHTML += card;
                }
            </script>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-24 right-6 w-14 h-14 bg-secondary-container text-on-secondary-container rounded-full shadow-lg flex items-center justify-center hover:scale-110 active:scale-90 transition-transform z-50">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-surface dark:bg-inverse-surface shadow-[0_-4px_12px_rgba(50,23,13,0.12)] z-50 rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-tertiary-container px-4 py-2 hover:bg-surface-container-highest transition-colors rounded-xl active:scale-90 duration-100" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-lg text-label-lg">Dash</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-tertiary-container px-4 py-2 hover:bg-surface-container-highest transition-colors rounded-xl active:scale-90 duration-100" href="#">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
<span class="font-label-lg text-label-lg">Workers</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-xl px-4 py-2 active:scale-90 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="table_restaurant" style="font-variation-settings: 'FILL' 1;">table_restaurant</span>
<span class="font-label-lg text-label-lg">Tables</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-tertiary-container px-4 py-2 hover:bg-surface-container-highest transition-colors rounded-xl active:scale-90 duration-100" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-lg text-label-lg">Profile</span>
</a>
</nav>
<!-- Visual Polish: Warm Texture Overlay -->
<div class="pointer-events-none fixed inset-0 z-0 opacity-[0.03]" style="background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');"></div>
<script>
        // Simple micro-interaction for cards
        document.querySelectorAll('section > div').forEach(card => {
            card.addEventListener('click', function() {
                this.classList.add('ring-2', 'ring-primary');
                setTimeout(() => {
                    this.classList.remove('ring-2', 'ring-primary');
                }, 400);
            });
        });

        // Sticky header transition logic
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
                header.classList.remove('shadow-sm');
            } else {
                header.classList.add('shadow-sm');
                header.classList.remove('shadow-md');
            }
        });
    </script>
</body></html>
