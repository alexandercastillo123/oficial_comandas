                    "primary-fixed": "#ffdbce",

                    "surface-container": "#f7ece5",
                    "outline-variant": "#d5c3bd",

            "spacing": {

                    "base": "4px",
                    "xs": "4px",
                    "margin-desktop": "32px",
                    "margin-mobile": "16px",
                    "lg": "24px",
                    "xl": "32px",
                    "md": "16px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "headline-sm": ["Manrope"],
                    "body-lg": ["Work Sans"],
                    "headline-lg": ["Manrope"],
                    "body-md": ["Work Sans"],
                    "headline-lg-mobile": ["Manrope"],

                    "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "label-lg": ["14px", {"letterSpacing": "0.5px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]

          },
        },
      }

<style>
        body {
            background-color: #fff8f5; /* Warm Cream Base */
            color: #201b17; /* On Surface */
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .role-option input:checked + div {
            background-color: #fed65b; /* secondary-container */
            color: #745c00; /* on-secondary-container */
            border-color: #735c00;
        }
        .login-card {
            box-shadow: 0 4px 20px rgba(50, 23, 13, 0.08);
        }
        .pattern-bg {
            background-image: radial-gradient(#d5c3bd 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-body-md pattern-bg">
<!-- Login Container -->
<main class="w-full max-w-[440px] animate-fade-in">
<!-- Header Section -->
<div class="flex flex-col items-center mb-xl">
<div class="mb-lg overflow-hidden flex items-center justify-center h-24">
<img alt="La Ideal Bakery Logo" class="h-full w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDoBXZKX_dhRQ0Jy5xdsUFEVDsHWzqvAfzqVStaxIuLCw5O2m-pysCSA1IIlmH0SQFL1YCF7uecTaiTirJhzxOFffOdq7-7QtrFuYrW2eBR_J-VnXkAyfruygFBESTMdtDdV-73h3DLjwPKeCUkCSSiF9LZCF3fPeBkXE0jpHIZVD5tHnqxWaMMeHXfRJLwFZivQnCEDgSVxjCH0gyd5RzX9S9IXCH_am-wMQJkmz5oeNswgLV9ci78z9FXIywVx_U9Uyi-Xzl8fMl0">
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary text-center">
                Bienvenido a La Ideal
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-sm">
                Gestión Artesanal de Panadería
            </p>
</div>
<!-- Login Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg login-card">
<form class="space-y-md" id="loginForm">
<!-- Role Selection -->
<div class="space-y-sm">
<span class="font-label-lg text-label-lg text-on-surface-variant px-1">Puesto de trabajo</span>
<div class="grid grid-cols-3 gap-sm">
<label class="role-option cursor-pointer group">
<input checked="" class="hidden" name="role" type="radio" value="waiter">
<div class="flex flex-col items-center justify-center p-sm border border-outline-variant rounded-lg transition-all hover:bg-surface-container-high active:scale-95">
<span class="material-symbols-outlined mb-xs" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Mesero</span>
</div>
</label>
<label class="role-option cursor-pointer group">
<input class="hidden" name="role" type="radio" value="chef">
<div class="flex flex-col items-center justify-center p-sm border border-outline-variant rounded-lg transition-all hover:bg-surface-container-high active:scale-95">
<span class="material-symbols-outlined mb-xs" data-icon="restaurant">restaurant</span>
<span class="font-label-sm text-label-sm">Chef</span>
</div>
</label>
<label class="role-option cursor-pointer group">
<input class="hidden" name="role" type="radio" value="admin">
<div class="flex flex-col items-center justify-center p-sm border border-outline-variant rounded-lg transition-all hover:bg-surface-container-high active:scale-95">
<span class="material-symbols-outlined mb-xs" data-icon="badge">badge</span>
<span class="font-label-sm text-label-sm">Admin</span>
</div>
</label>
</div>
</div>
<!-- Input Groups -->
<div class="space-y-md pt-base">
<div class="relative group">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 font-label-sm text-label-sm text-outline group-focus-within:text-primary transition-colors" for="username">Usuario</label>
<div class="flex items-center border border-outline rounded-lg px-md h-12 group-focus-within:border-primary group-focus-within:border-2 transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-sm" data-icon="person_outline">person_outline</span>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="username" name="username" placeholder="Ingrese su usuario" required="" type="text">
</div>
</div>
<div class="relative group">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 font-label-sm text-label-sm text-outline group-focus-within:text-primary transition-colors" for="password">Contraseña</label>
<div class="flex items-center border border-outline rounded-lg px-md h-12 group-focus-within:border-primary group-focus-within:border-2 transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-sm" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="text-outline-variant hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="pt-lg">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-sm text-headline-sm flex items-center justify-center gap-sm hover:bg-primary-container hover:text-on-primary-container transition-all shadow-md active:scale-[0.98] transform" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Links -->
<div class="flex justify-between items-center pt-md">
<a class="font-label-lg text-label-lg text-primary hover:underline transition-all" href="#">¿Olvidó su contraseña?</a>
<div class="flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Sistema Activo</span>
</div>
</div>
</form>
</section>
<!-- Aesthetic Footer Section -->
<footer class="mt-xl grid grid-cols-2 gap-md opacity-80">
<div class="bg-surface-container-high rounded-xl p-md flex items-center gap-md border border-outline-variant/30">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="schedule">schedule</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-outline">Turno Actual</p>
<p class="font-label-lg text-label-lg text-primary">Mañana</p>
</div>
</div>
<div class="bg-surface-container-high rounded-xl p-md flex items-center gap-md border border-outline-variant/30">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-outline">Sucursal</p>
<p class="font-label-lg text-label-lg text-primary">Central</p>
</div>
</div>
</footer>
</main>
<!-- Micro-interaction Scripts -->
<script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                pwd.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Form Submission visual feedback
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span><span>Cargando...</span>';
            
            // Artificial delay for feedback
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('Sesión iniciada con éxito. Redirigiendo...');
            }, 1200);
        });

        // Add subtle hover effect to the container
        const card = document.querySelector('.login-card');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body></html>
