<script>
        let selectedLocation = "Main Hall";
        let selectedCapacity = "2";

        function setLocation(loc) {
            selectedLocation = loc;
            document.querySelectorAll('.location-btn').forEach(btn => {
                if (btn.innerText.includes(loc)) {
                    btn.classList.add('bg-primary', 'text-on-primary', 'border-primary');
                    btn.querySelector('.material-symbols-outlined').style.color = 'white';
                } else {
                    btn.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    btn.querySelector('.material-symbols-outlined').style.color = '#32170d';
                }
            });
            updatePreview();
        }

        function setCapacity(cap) {
            selectedCapacity = cap;
            document.querySelectorAll('.cap-btn').forEach(btn => {
                if (btn.innerText === cap) {
                    btn.classList.add('bg-primary', 'text-on-primary', 'border-primary');
                } else {
                    btn.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                }
            });
            updatePreview();
        }

        function updatePreview() {
            const num = document.getElementById('table_number').value || '--';
            const status = document.querySelector('input[name="status"]:checked').value;
            
            document.getElementById('previewNumber').innerText = num;
            document.getElementById('previewLocation').innerText = selectedLocation;
            document.getElementById('previewCapacity').innerText = selectedCapacity + ' pax';
            
            const badge = document.getElementById('previewStatusBadge');
            const statusText = document.getElementById('previewStatusText');
            const statusDot = badge.querySelector('div');
            const card = document.getElementById('previewCard');

            if (status === 'available') {
                badge.className = 'px-sm py-1 rounded-full bg-secondary-container/20 text-on-secondary-container text-label-sm font-semibold flex items-center gap-1';
                statusDot.className = 'w-2 h-2 rounded-full bg-secondary-container';
                statusText.innerText = 'AVAILABLE';
                card.style.borderTopColor = '#fed65b';
            } else {
                badge.className = 'px-sm py-1 rounded-full bg-tertiary-container/20 text-on-tertiary-container text-label-sm font-semibold flex items-center gap-1';
                statusDot.className = 'w-2 h-2 rounded-full bg-tertiary-container';
                statusText.innerText = 'RESERVED';
                card.style.borderTopColor = '#36342b';
            }

            // Simple bounce effect for update
            card.classList.add('scale-105');
            setTimeout(() => card.classList.remove('scale-105'), 150);
        }

        // Initialize defaults
        document.addEventListener('DOMContentLoaded', () => {
            setLocation('Main Hall');
            setCapacity('2');
            updatePreview();
        });
    </script>
