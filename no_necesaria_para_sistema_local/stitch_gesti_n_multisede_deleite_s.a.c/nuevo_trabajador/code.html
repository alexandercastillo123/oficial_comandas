<script>
        // Photo upload preview logic
        const photoInput = document.getElementById('photo-input');
        const photoPreview = document.getElementById('preview-img');
        const photoIcon = document.getElementById('photo-icon');

        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoPreview.src = event.target.result;
                    photoPreview.classList.remove('hidden');
                    photoIcon.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Form submission animation
        const form = document.getElementById('workerForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalContent = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Guardando...';
            
            setTimeout(() => {
                alert('¡Trabajador guardado con éxito!');
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
                form.reset();
                photoPreview.classList.add('hidden');
                photoIcon.classList.remove('hidden');
            }, 1500);
        });

        // Micro-interactions for shift select
        const select = document.getElementById('shift');
        select.addEventListener('change', () => {
            select.parentElement.classList.add('scale-[1.02]');
            setTimeout(() => select.parentElement.classList.remove('scale-[1.02]'), 200);
        });
    </script>
