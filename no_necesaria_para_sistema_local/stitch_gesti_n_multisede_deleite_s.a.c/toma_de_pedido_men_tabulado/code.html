<!-- Bottom Navigation Shell (as Anchor) -->

<script>
        // Simple micro-interaction for item adding
        document.querySelectorAll('.product-card button').forEach(button => {
            button.addEventListener('click', (e) => {
                e.stopPropagation();
                // Visual feedback only for demo
                button.classList.add('bg-secondary');
                setTimeout(() => button.classList.remove('bg-secondary'), 200);
            });
        });

        // Tab switching logic (simple visual toggle)
        const tabs = document.querySelectorAll('nav[class*="border-b"] button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('text-primary', 'border-b-2', 'border-primary');
                    t.classList.add('text-on-surface-variant');
                });
                tab.classList.add('text-primary', 'border-b-2', 'border-primary');
                tab.classList.remove('text-on-surface-variant');
            });
        });
    </script>
