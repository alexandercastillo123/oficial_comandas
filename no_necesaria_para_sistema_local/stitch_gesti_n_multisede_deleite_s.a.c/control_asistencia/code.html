<script>
        // Digital Clock Logic
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-ES', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false 
            });
            document.getElementById('digital-clock').textContent = timeStr;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('es-ES', options);
            document.getElementById('current-date').textContent = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // QR Timer Logic
        let timeLeft = 5;
        const circle = document.getElementById('timer-circle');
        const counter = document.getElementById('seconds-counter');
        const totalOffset = 50.24;

        function updateTimer() {
            if (timeLeft < 0) {
                timeLeft = 5;
            }
            counter.textContent = timeLeft;
            const offset = totalOffset - (timeLeft / 5) * totalOffset;
            circle.style.strokeDashoffset = offset;
            timeLeft--;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Micro-interaction for QR updates
        document.querySelector('button.text-secondary').addEventListener('click', () => {
            timeLeft = 5;
            updateTimer();
            // Simple visual feedback
            const qrContainer = document.querySelector('.group');
            qrContainer.classList.add('scale-95', 'opacity-50');
            setTimeout(() => {
                qrContainer.classList.remove('scale-95', 'opacity-50');
            }, 150);
        });
    </script>
